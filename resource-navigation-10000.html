<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌐 大型资源导航 - 10000+网站</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #7c3aed;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border-radius: 20px;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        
        .stat {
            background: rgba(255,255,255,0.2);
            padding: 15px 25px;
            border-radius: 10px;
            text-align: center;
            min-width: 120px;
        }
        
        .stat-number {
            font-size: 2rem;
            font-weight: bold;
        }
        
        .stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        
        .search-box {
            max-width: 600px;
            margin: 30px auto;
        }
        
        #search {
            width: 100%;
            padding: 15px 20px;
            font-size: 1rem;
            border: 2px solid var(--border);
            border-radius: 10px;
            outline: none;
            transition: all 0.3s;
        }
        
        #search:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        
        .filters {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .filter {
            padding: 8px 16px;
            background: white;
            border: 1px solid var(--border);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .filter:hover, .filter.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        .resources {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        
        .resource {
            background: var(--card);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            border: 1px solid var(--border);
        }
        
        .resource:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        
        .resource h3 {
            color: var(--primary);
            margin-bottom: 10px;
            font-size: 1.2rem;
        }
        
        .resource .url {
            color: var(--secondary);
            font-size: 0.9rem;
            margin-bottom: 10px;
            word-break: break-all;
        }
        
        .resource .desc {
            color: var(--text-light);
            margin-bottom: 15px;
            font-size: 0.95rem;
        }
        
        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 10px;
        }
        
        .tag {
            background: var(--bg);
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 0.8rem;
            color: var(--text-light);
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin: 40px 0;
        }
        
        .page-btn {
            padding: 8px 16px;
            background: white;
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
        }
        
        .page-btn:hover:not(:disabled) {
            background: var(--primary);
            color: white;
        }
        
        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        footer {
            text-align: center;
            padding: 30px;
            color: var(--text-light);
            border-top: 1px solid var(--border);
            margin-top: 40px;
        }
        
        @media (max-width: 768px) {
            .resources {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .stats {
                gap: 15px;
            }
            
            .stat {
                min-width: 100px;
                padding: 12px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌐 大型资源导航</h1>
            <p class="subtitle">收录 10000+ 优质网站资源，智能搜索，分类筛选</p>
            <div class="stats">
                <div class="stat">
                    <div class="stat-number" id="totalCount">10,000+</div>
                    <div class="stat-label">网站资源</div>
                </div>
                <div class="stat">
                    <div class="stat-number" id="categoryCount">15</div>
                    <div class="stat-label">分类</div>
                </div>
                <div class="stat">
                    <div class="stat-number" id="tagCount">50+</div>
                    <div class="stat-label">标签</div>
                </div>
            </div>
        </header>
        
        <div class="search-box">
            <input type="text" id="search" placeholder="🔍 搜索网站名称、描述或标签...">
        </div>
        
        <div class="filters" id="filters">
            <!-- 分类筛选按钮 -->
        </div>
        
        <div class="resources" id="resources">
            <!-- 资源卡片 -->
        </div>
        
        <div class="pagination">
            <button id="prev" class="page-btn" disabled>上一页</button>
            <span id="pageInfo">第 1 页 / 共 1 页</span>
            <button id="next" class="page-btn">下一页</button>
        </div>
        
        <footer>
            <p>📊 数据持续更新 | 响应式设计 | 支持大规模数据浏览</p>
        </footer>
    </div>

    <script>
        // 数据生成器 - 生成10000条模拟资源
        class DataGenerator {
            constructor() {
                this.categories = [
                    { id: 'ai', name: '人工智能', color: '#10b981' },
                    { id: 'web', name: '网站开发', color: '#3b82f6' },
                    { id: 'design', name: '设计资源', color: '#8b5cf6' },
                    { id: 'learning', name: '学习平台', color: '#f59e0b' },
                    { id: 'tools', name: '在线工具', color: '#ef4444' },
                    { id: 'media', name: '媒体资源', color: '#ec4899' },
                    { id: 'data', name: '数据科学', color: '#6366f1' },
                    { id: 'business', name: '商业工具', color: '#14b8a6' },
                    { id: 'entertainment', name: '娱乐休闲', color: '#f97316' },
                    { id: 'productivity', name: '效率工具', color: '#06b6d4' },
                    { id: 'security', name: '网络安全', color: '#84cc16' },
                    { id: 'cloud', name: '云服务', color: '#0ea5e9' },
                    { id: 'mobile', name: '移动开发', color: '#8b5cf6' },
                    { id: 'game', name: '游戏开发', color: '#f43f5e' },
                    { id: 'blockchain', name: '区块链', color: '#f59e0b' }
                ];
                
                this.domains = [
                    'github.com', 'stackoverflow.com', 'medium.com', 'dev.to', 
                    'css-tricks.com', 'codepen.io', 'jsfiddle.net', 'replit.com',
                    'figma.com', 'adobe.com', 'notion.so', 'trello.com',
                    'aws.amazon.com', 'cloud.google.com', 'azure.microsoft.com'
                ];
                
                this.adjectives = ['智能', '高效', '创新', '专业', '实用', '强大', '简洁'];
                this.nouns = ['工具', '平台', '服务', '网站', '应用', '系统', '框架'];
                this.descriptions = [
                    '提供全面的解决方案', '专注于提升工作效率', '创新的技术实现',
                    '专业的技术支持', '实用的工具集合', '强大的功能特性'
                ];
                this.tags = ['AI', '前端', '后端', '云计算', '设计', '学习', '工具', '数据'];
                
                this.resources = this.generateResources(10000);
                this.currentPage = 1;
                this.pageSize = 20;
                this.currentFilter = 'all';
                this.currentSearch = '';
            }
            
            generateResources(count) {
                const resources = [];
                for (let i = 1; i <= count; i++) {
                    const category = this.categories[Math.floor(Math.random() * this.categories.length)];
                    const domain = this.domains[Math.floor(Math.random() * this.domains.length)];
                    const adj = this.adjectives[Math.floor(Math.random() * this.adjectives.length)];
                    const noun = this.nouns[Math.floor(Math.random() * this.nouns.length)];
                    const desc = this.descriptions[Math.floor(Math.random() * this.descriptions.length)];
                    
                    // 生成随机标签
                    const resourceTags = [];
                    const tagCount = Math.floor(Math.random() * 3) + 1;
                    for (let j = 0; j < tagCount; j++) {
                        const tag = this.tags[Math.floor(Math.random() * this.tags.length)];
                        if (!resourceTags.includes(tag)) {
                            resourceTags.push(tag);
                        }
                    }
                    
                    resources.push({
                        id: i,
                        name: `${adj}${noun}${i}`,
                        url: `https://${domain}/${adj.toLowerCase()}-${noun.toLowerCase()}-${i}`,
                        description: `${desc}，适用于${category.name}领域`,
                        category: category.id,
                        categoryName: category.name,
                        categoryColor: category.color,
                        tags: resourceTags,
                        visits: Math.floor(Math.random() * 10000)
                    });
                }
                return resources;
            }
            
            getFilteredResources() {
                let filtered = this.resources;
                
                if (this.currentFilter !== 'all') {
                    filtered = filtered.filter(r => r.category === this.currentFilter);
                }
                
                if (this.currentSearch) {
                    const search = this.currentSearch.toLowerCase();
                    filtered = filtered.filter(r => 
                        r.name.toLowerCase().includes(search) ||
                        r.description.toLowerCase().includes(search) ||
                        r.tags.some(t => t.toLowerCase().includes(search)) ||
                        r.categoryName.toLowerCase().includes(search)
                    );
                }
                
                return filtered;
            }
            
            getPaginatedResources() {
                const filtered = this.getFilteredResources();
                const start = (this.currentPage - 1) * this.pageSize;
                return filtered.slice(start, start + this.pageSize);
            }
            
            getTotalPages() {
                const filtered = this.getFilteredResources();
                return Math.ceil(filtered.length / this.pageSize);
            }
        }
        
        // 页面控制器
        class PageController {
            constructor() {
                this.data = new DataGenerator();
                this.init();
            }
            
            init() {
                this.renderFilters();
                this.renderResources();
                this.setupEvents();
                this.updateStats();
            }
            
            renderFilters() {
                const container = document.getElementById('filters');
                let html = '<button class="filter active" data-category="all">全部</button>';
                
                this.data.categories.forEach(cat => {
                    html += `<button class="filter" data-category="${cat.id}" style="border-left: 3px solid ${cat.color}">${cat.name}</button>`;
                });
                
                container.innerHTML = html;
            }
            
            renderResources() {
                const container = document.getElementById('resources');
                const resources = this.data.getPaginatedResources();
                
                if (resources.length === 0) {
                    container.innerHTML = '<div style="text-align: center; padding: 40px; color: #666;">未找到匹配的资源</div>';
                    return;
                }
                
                let html = '';
                resources.forEach(res => {
                    html += `
                        <div class="resource">
                            <h3>${res.name}</h3>
                            <div class="url">${res.url}</div>
                            <div class="desc">${res.description}</div>
                            <div class="tags">
                                ${res.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                            </div>
                            <div style="margin-top: 10px; font-size: 0.9rem; color: #888;">
                                <span>👁️ ${res.visits.toLocaleString()} 访问</span>
                                <span style="margin-left: 15px;">🏷️ ${res.categoryName}</span>
                            </div>
                        </div>
                    `;
                });
                
                container.innerHTML = html;
            }
            
            updateStats() {
                const filtered = this.data.getFilteredResources();
                const categories = new Set(filtered.map(r => r.category));
                const allTags = new Set();
                filtered.forEach(r => r.tags.forEach(t => allTags.add(t)));
                
                document.getElementById('totalCount').textContent = filtered.length.toLocaleString();
                document.getElementById('categoryCount').textContent = categories.size;
                document.getElementById('tagCount').textContent = allTags.size;
                
                // 更新分页
                const totalPages = this.data.getTotalPages();
                document.getElementById('pageInfo').textContent = `第 ${this.data.currentPage} 页 / 共 ${totalPages} 页`;
                document.getElementById('prev').disabled = this.data.currentPage === 1;
                document.getElementById('next').disabled = this.data.currentPage === totalPages;
            }
            
            setupEvents() {
                // 分类筛选
                document.querySelectorAll('.filter').forEach(btn => {
                    btn.addEventListener('click', () => {
                        document.querySelectorAll('.filter').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        
                        this.data.currentFilter = btn.dataset.category;
                        this.data.currentPage = 1;
                        this.renderResources();
                        this.updateStats();
                    });
                });
                
                // 搜索
                const searchInput = document.getElementById('search');
                let timeout;
                searchInput.addEventListener('input', () => {
                    clearTimeout(timeout);
                    timeout = setTimeout(() => {
                        this.data.currentSearch = searchInput.value;
                        this.data.currentPage = 1;
                        this.renderResources();
                        this.updateStats();
                    }, 300);
                });
                
                // 分页
                document.getElementById('prev').addEventListener('click', () => {
                    if (this.data.currentPage > 1) {
                        this.data.currentPage--;
                        this.renderResources();
                        this.updateStats();
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    }
                });
                
                document.getElementById('next').addEventListener('click', () => {
                    const totalPages = this.data.getTotalPages();
                    if (this.data.currentPage < totalPages) {
                        this.data.currentPage++;
                        this.renderResources();
                        this.updateStats();
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    }
                });
            }
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            new PageController();
        });
    </script>
</body>
</html>
