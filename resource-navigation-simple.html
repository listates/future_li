<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互联网资源导航 - 简洁版</title>
    <style>
        :root {
            --primary-color: #4361ee;
            --secondary-color: #3a0ca3;
            --accent-color: #7209b7;
            --light-color: #f8f9fa;
            --dark-color: #212529;
            --success-color: #4cc9f0;
            --warning-color: #f72585;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            line-height: 1.6;
            color: var(--dark-color);
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            padding: 50px 20px;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
            border-radius: 15px;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }
        
        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none"><path d="M0,0 L100,0 L100,100 Z" fill="white" opacity="0.1"/></svg>');
            pointer-events: none;
        }
        
        h1 {
            font-size: 3rem;
            margin-bottom: 15px;
            font-weight: 800;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        .subtitle {
            font-size: 1.3rem;
            opacity: 0.95;
            max-width: 800px;
            margin: 0 auto 25px;
        }
        
        .quick-stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin-top: 30px;
        }
        
        .stat {
            background: rgba(255, 255, 255, 0.2);
            padding: 15px 25px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .search-container {
            max-width: 700px;
            margin: 40px auto;
            position: relative;
        }
        
        .search-box {
            display: flex;
            gap: 10px;
        }
        
        #searchInput {
            flex: 1;
            padding: 18px 25px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            transition: all 0.3s ease;
            background: white;
        }
        
        #searchInput:focus {
            outline: none;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.25);
            transform: translateY(-3px);
        }
        
        .search-btn {
            padding: 0 30px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }
        
        .search-btn:hover {
            background: var(--secondary-color);
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
        }
        
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }
        
        .category-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: all 0.4s ease;
            border: 1px solid rgba(0, 0, 0, 0.05);
            position: relative;
            overflow: hidden;
        }
        
        .category-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, var(--primary-color), var(--accent-color));
        }
        
        .category-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }
        
        .category-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .category-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .category-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--dark-color);
        }
        
        .resources-list {
            list-style: none;
        }
        
        .resource-item {
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 10px;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }
        
        .resource-item:hover {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-color: #dee2e6;
            transform: translateX(5px);
        }
        
        .resource-link {
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
            color: var(--dark-color);
            font-weight: 500;
        }
        
        .resource-favicon {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            object-fit: cover;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
        }
        
        .resource-info {
            flex: 1;
        }
        
        .resource-name {
            font-size: 1.1rem;
            margin-bottom: 5px;
        }
        
        .resource-desc {
            font-size: 0.9rem;
            color: #6c757d;
            line-height: 1.4;
        }
        
        .resource-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        
        .tag {
            background: #e9ecef;
            color: #495057;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }
        
        .tag:hover {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
            transform: translateY(-2px);
        }
        
        .quick-access {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin: 40px 0;
            justify-content: center;
        }
        
        .quick-btn {
            padding: 12px 25px;
            background: white;
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .quick-btn:hover {
            background: var(--primary-color);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(67, 97, 238, 0.3);
        }
        
        footer {
            text-align: center;
            padding: 40px 20px;
            margin-top: 60px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 -5px 30px rgba(0, 0, 0, 0.1);
        }
        
        .footer-stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 30px 0;
            flex-wrap: wrap;
        }
        
        .footer-stat {
            text-align: center;
        }
        
        .footer-stat-number {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--primary-color);
            margin-bottom: 5px;
        }
        
        .footer-stat-label {
            font-size: 0.9rem;
            color: #6c757d;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .shortcuts-hint {
            font-size: 0.9rem;
            color: #6c757d;
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            display: inline-block;
        }
        
        @media (max-width: 768px) {
            .categories-grid {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 2.2rem;
            }
            
            .search-box {
                flex-direction: column;
            }
            
            .search-btn {
                width: 100%;
                padding: 15px;
            }
            
            .quick-stats, .footer-stats {
                flex-direction: column;
                align-items: center;
                gap: 15px;
            }
            
            .category-card {
                padding: 20px;
            }
        }
        
        /* 动画效果 */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .category-card {
            animation: fadeIn 0.6s ease-out;
        }
        
        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 10px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 5px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--primary-color);
            border-radius: 5px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--secondary-color);
        }
        
        /* 加载动画 */
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
            color: var(--primary-color);
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>

</head>

        <div class="search-container">

                <button class="search-btn" id="searchButton">
                    <i class="fas fa-search"></i> 搜索
                </button>
            </div>
        </div>
        
        <div class="quick-access">
            <button class="quick-btn" data-tag="AI">🤖 AI工具</button>

        </div>
        
        <div class="loading" id="loading">

        </div>
        
        <div class="categories-grid" id="categoriesContainer">
            <!-- 类别将通过JavaScript动态生成 -->

        <footer>
            <h3>📊 资源统计</h3>

                <div class="footer-stat">
                    <div class="footer-stat-number" id="resourceCount">0</div>
                    <div class="footer-stat-label">资源总数</div>
                </div>
                <div class="footer-stat">
                    <div class="footer-stat-number" id="websiteCount">0</div>
                    <div class="footer-stat-label">网站数量</div>
                </div>
                <div class="footer-stat">
                    <div class="footer-stat-number" id="tagCount">0</div>
                    <div class="footer-stat-label">标签数量</div>
                </div>
            </div>
            
            <p style="margin: 20px 0; color: #6c757d;">
                最后更新: <span id="updateDate"></span> | 数据持续更新中

            <div class="shortcuts-hint">

            </div>
        </footer>
    </div>

        // 初始化页面
        document.addEventListener('DOMContentLoaded', function() {
            showLoading();
            setTimeout(() => {
                renderCategories();
                setupEventListeners();
                updateStats();
                document.getElementById('updateDate').textContent = new Date().toLocaleDateString('zh-CN', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric',
                    weekday: 'long'
                });
                hideLoading();
            }, 800);
        });

        // 显示加载动画
        function showLoading() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('categoriesContainer').style.opacity = '0.3';
        }

        // 隐藏加载动画
        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('categoriesContainer').style.opacity = '1';
        }

        // 渲染所有类别
        function renderCategories(filteredData = resourcesData) {
            const container = document.getElementById('categoriesContainer');
            container.innerHTML = '';
            
            filteredData.categories.forEach((category, index) => {
                const categoryElement = document.createElement('div');
                categoryElement.className = 'category-card';
                categoryElement.style.animationDelay = `${index * 0.1}s`;
                
                let resourcesHTML = '';
                category.resources.forEach(resource => {
                    resourcesHTML += `
                        <li class="resource-item">
                            <a href="${resource.url}" target="_blank" rel="noopener noreferrer" class="resource-link">
                                <div class="category-icon" style="background: ${category.color}">${category.icon}</div>
                                <div class="resource-info">
                                    <div class="resource-name">${resource.name}</div>
                                    <div class="resource-desc">${resource.desc}</div>
                                    <div class="resource-tags">
                                        ${resource.tags.map(tag => `<span class="tag" data-tag="${tag}">${tag}</span>`).join('')}
                                    </div>
                                </div>
                                <i class="fas fa-external-link-alt" style="color: #6c757d;"></i>
                            </a>
                        </li>
                    `;
                });
                
                categoryElement.innerHTML = `
                    <div class="category-header">
                        <div class="category-icon" style="background: ${category.color}">${category.icon}</div>
                        <h2 class="category-title">${category.name}</h2>
                    </div>
                    <ul class="resources-list">
                        ${resourcesHTML}
                    </ul>
                `;
                
                container.appendChild(categoryElement);
            });
            
            // 添加标签点击事件
            document.querySelectorAll('.tag').forEach(tag => {
                tag.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const tagText = this.getAttribute('data-tag');
                    filterByTag(tagText);
                });
            });
            
            // 添加资源链接点击事件（复制URL）
            document.querySelectorAll('.resource-link').forEach(link => {
                link.addEventListener('click', function(e) {
                    if (!e.target.classList.contains('tag')) {
                        e.preventDefault();
                        const url = this.href;
                        
                        // 复制到剪贴板
                        navigator.clipboard.writeText(url).then(() => {
                            const originalHTML = this.innerHTML;
                            this.innerHTML = '<i class="fas fa-check" style="color: #4CAF50;"></i> URL已复制！';
                            this.style.color = '#4CAF50';
                            
                            setTimeout(() => {
                                this.innerHTML = originalHTML;
                                this.style.color = '';
                                window.open(url, '_blank');
                            }, 1500);
                        }).catch(() => {
                            window.open(url, '_blank');
                        });
                    }
                });
            });
        }

        // 设置事件监听器
        function setupEventListeners() {
            const searchInput = document.getElementById('searchInput');
            const searchButton = document.getElementById('searchButton');
            const quickButtons = document.querySelectorAll('.quick-btn');
            
            // 搜索功能
            let searchTimeout;
            searchInput.addEventListener('input', function() {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    performSearch(this.value);
                }, 300);
            });
            
            searchButton.addEventListener('click', () => performSearch(searchInput.value));
            
            // 快速按钮
            quickButtons.forEach(button => {
                button.addEventListener('click', function() {
                    const tag = this.getAttribute('data-tag');
                    searchInput.value = tag;
                    performSearch(tag);
                });
            });
            
            // 键盘快捷键
            document.addEventListener('keydown', function(e) {
                // / 键聚焦搜索框
                if (e.key === '/' && !e.ctrlKey && !e.metaKey) {
                    e.preventDefault();
                    searchInput.focus();
                }
                
                // Ctrl/Cmd + F 聚焦搜索框
                if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
                    e.preventDefault();
                    searchInput.focus();
                }
                
                // Escape 清除搜索
                if (e.key === 'Escape') {
                    searchInput.value = '';
                    performSearch('');
                }
            });
        }

        // 执行搜索
        function performSearch(query) {
            showLoading();
            
            setTimeout(() => {
                query = query.toLowerCase().trim();
                
                if (query === '') {
                    renderCategories();
                    updateStats();
                    hideLoading();
                    return;
                }
                
                const filteredData = {
                    categories: resourcesData.categories.map(category => {
                        const filteredResources = category.resources.filter(resource => {
                            return resource.name.toLowerCase().includes(query) ||
                                   resource.desc.toLowerCase().includes(query) ||
                                   resource.tags.some(tag => tag.toLowerCase().includes(query)) ||
                                   resource.url.toLowerCase().includes(query);
                        });
                        
                        return filteredResources.length > 0 ? {
                            ...category,
                            resources: filteredResources
                        } : null;
                    }).filter(Boolean)
                };
                
                renderCategories(filteredData);
                updateStats(filteredData);
                hideLoading();
                
                // 如果有结果，滚动到第一个
                if (filteredData.categories.length > 0) {
                    document.querySelector('.category-card').scrollIntoView({
                        behavior: 'smooth',
                        block: 'start'
                    });
                }
            }, 300);
        }

        // 按标签筛选
        function filterByTag(tag) {
            const searchInput = document.getElementById('searchInput');
            searchInput.value = tag;
            performSearch(tag);
        }

        // 更新统计信息
        function updateStats(data = resourcesData) {
            let totalResources = 0;
            let totalWebsites = new Set();
            let allTags = new Set();
            
            data.categories.forEach(category => {
                totalResources += category.resources.length;
                category.resources.forEach(resource => {
                    try {
                        const url = new URL(resource.url);
                        totalWebsites.add(url.hostname);
                    } catch (e) {
                        totalWebsites.add(resource.url);
                    }
                    resource.tags.forEach(tag => allTags.add(tag));
                });
            });
            
            document.getElementById('categoryCount').textContent = data.categories.length;
            document.getElementById('resourceCount').textContent = totalResources;
            document.getElementById('websiteCount').textContent = totalWebsites.size;
            document.getElementById('tagCount').textContent = allTags.size;
        }

        // 添加随机推荐功能
        function getRandomResource() {
            const allResources = [];
            resourcesData.categories.forEach(category => {
                category.resources.forEach(resource => {
                    allResources.push({
                        ...resource,
                        category: category.name,
                        categoryColor: category.color,
                        categoryIcon: category.icon
                    });
                });
            });
            
            if (allResources.length > 0) {
                const randomResource = allResources[Math.floor(Math.random() * allResources.length)];
                
                // 显示推荐
                const recommendation = `
                    <div style="
                        position: fixed;
                        bottom: 20px;
                        right: 20px;
                        background: white;
                        padding: 20px;
                        border-radius: 15px;
                        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
                        z-index: 1000;
                        max-width: 300px;
                        border-left: 5px solid ${randomResource.categoryColor};
                        animation: slideIn 0.5s ease-out;
                    ">
                        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
                            <div style="
                                width: 40px;
                                height: 40px;
                                border-radius: 10px;
                                background: ${randomResource.categoryColor};
                                display: flex;
                                align-items: center;
                                justify-content: center;
                                color: white;
                                font-size: 1.2rem;
                            ">
                                ${randomResource.categoryIcon}
                            </div>
                            <div>
                                <strong>🎲 随机推荐</strong>
                                <div style="font-size: 0.9rem; color: #666;">${randomResource.category}</div>
                            </div>
                        </div>
                        <div style="margin: 10px 0;">
                            <strong>${randomResource.name}</strong>
                            <div style="font-size: 0.9rem; color: #666; margin-top: 5px;">${randomResource.desc}</div>
                        </div>
                        <button onclick="window.open('${randomResource.url}', '_blank'); this.parentElement.remove()" 
                                style="
                                    background: ${randomResource.categoryColor};
                                    color: white;
                                    border: none;
                                    padding: 8px 20px;
                                    border-radius: 20px;
                                    cursor: pointer;
                                    width: 100%;
                                    font-weight: 600;
                                    transition: all 0.3s ease;
                                "
                                onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 5px 15px rgba(0,0,0,0.2)'"
                                onmouseout="this.style.transform=''; this.style.boxShadow=''">
                            访问网站
                        </button>
                        <button onclick="this.parentElement.remove()" 
                                style="
                                    background: transparent;
                                    border: none;
                                    color: #666;
                                    margin-top: 10px;
                                    cursor: pointer;
                                    font-size: 0.9rem;
                                ">
                            关闭
                        </button>
                    </div>
                `;
                
                const existing = document.querySelector('.random-recommendation');
                if (existing) existing.remove();
                
                document.body.insertAdjacentHTML('beforeend', recommendation);
                
                // 5秒后自动关闭
                setTimeout(() => {
                    const rec = document.querySelector('.random-recommendation');
                    if (rec) rec.remove();
                }, 5000);
            }
        }

        // 添加CSS动画
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from {
                    transform: translateX(100%);
                    opacity: 0;
                }
                to {
                    transform: translateX(0);
                    opacity: 1;
                }
            }
            
            .random-recommendation {
                animation: slideIn 0.5s ease-out;
            }
        `;
        document.head.appendChild(style);

        // 添加随机推荐按钮到页面
        const randomBtn = document.createElement('button');
        randomBtn.innerHTML = '🎲 随机推荐';
        randomBtn.style.cssText = `
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            z-index: 999;
            transition: all 0.3s ease;
        `;
        randomBtn.onmouseover = () => {
            randomBtn.style.transform = 'translateY(-3px)';
            randomBtn.style.boxShadow = '0 8px 25px rgba(0,0,0,0.3)';
        };
        randomBtn.onmouseout = () => {
            randomBtn.style.transform = '';
            randomBtn.style.boxShadow = '0 5px 20px rgba(0,0,0,0.2)';
        };
        randomBtn.onclick = getRandomResource;
        document.body.appendChild(randomBtn);

        // 添加分享功能
        function sharePage() {
            if (navigator.share) {
                navigator.share({
                    title: '互联网资源导航',
                    text: '发现互联网上最有价值的资源网站！',
                    url: window.location.href
                });
            } else {
                navigator.clipboard.writeText(window.location.href).then(() => {
                    alert('链接已复制到剪贴板！');
                });
            }
        }

        // 添加分享按钮
        const shareBtn = document.createElement('button');
        shareBtn.innerHTML = '📤 分享';
        shareBtn.style.cssText = `
            position: fixed;
            bottom: 70px;
            left: 20px;
            background: linear-gradient(135deg, #4CAF50 0%, #2E7D32 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            z-index: 999;
            transition: all 0.3s ease;
        `;
        shareBtn.onmouseover = () => {
            shareBtn.style.transform = 'translateY(-3px)';
            shareBtn.style.boxShadow = '0 8px 25px rgba(0,0,0,0.3)';
        };
        shareBtn.onmouseout = () => {
            shareBtn.style.transform = '';
            shareBtn.style.boxShadow = '0 5px 20px rgba(0,0,0,0.2)';
        };
        shareBtn.onclick = sharePage;
        document.body.appendChild(shareBtn);
    </script>
